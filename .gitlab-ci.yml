# このファイルについて（重要）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 【目的】
# このファイルはサービスリポジトリ内の `.gitlab-ci.yml` に
# Playwrightステージを追加するための参考用テンプレートです。
#
# 【使用手順】
# 1. サービスリポジトリの `.gitlab-ci.yml` を開く
# 2. このファイルの内容を参考に、Playwrightステージを追加する
# 3. サービス側のCI設定を変更したら、**このファイルは削除する**
#
# 【注意】
# ⚠️ このファイル自体をリポジトリにpushしないでください
# ⚠️ サービス側のCI設定完了後は、このファイルを削除してください
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Playwright E2Eテスト CI/CD設定
# atlasプロジェクトの設定を参考に作成

include:
  - project: unit4/ci-templates
    ref: master
    file:
      - unit4-playwright-test/unit4-playwright-test.yml

image: mcr.microsoft.com/playwright:v1.58.0-jammy

variables:
  TZ: Asia/Tokyo
  FF_USE_FASTZIP: "true"
  # Playwrightテスト用の環境変数
  E2E_DIR: "e2e"  # サービスリポジトリに統合時はe2eディレクトリ
  BASE_URL: "https://www.m3.com"
  BACKROOM_BASE_URL: "https://backroom-qa1.m3.com"
  PLAYWRIGHT_WORKERS: "1"  # 並列実行ワーカー数（順次実行）
  PLAYWRIGHT_RETRIES: "1"  # リトライ回数

stages:
  - test
  - integration

.rules:
  default: &rules-default
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

  manual: &rules-manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

# Playwright E2Eテスト（PC/SP両対応）
playwright:test:
  rules: *rules-default
  stage: test
  interruptible: true
  extends: .unit4-playwright-test
  before_script:
    - npm ci
    - npx playwright install --with-deps chromium
  script:
    - npx playwright test --project=chromium-desktop --project=chromium-mobile
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: '1 week'

# QA環境別Playwrightテスト（マニュアル実行）
.playwright-qa-test:
  rules: *rules-manual
  stage: integration
  interruptible: true
  extends: .unit4-playwright-test
  before_script:
    - npm ci
    - npx playwright install --with-deps chromium
  script:
    - npx playwright test --project=chromium-desktop --project=chromium-mobile

playwright:qa1:
  extends: .playwright-qa-test
  variables:
    BASE_URL: "https://www.m3.com"
    BACKROOM_BASE_URL: "https://backroom-qa1.m3.com"
  resource_group: qa1

